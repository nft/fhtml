name: Deploy landing page

# Builds site/ with the fhtml compiler + Tailwind and publishes to GitHub Pages.
# Rebuilds when the page, the compiler, or the manifests change — a compiler
# change can change the emitted HTML, so src/ and Cargo.* are triggers too.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time. Don't cancel an in-flight run — a half-finished Pages
# deploy is worse than a slightly stale one (matches GitHub's starter workflow).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Pin the Tailwind standalone CLI. Bump deliberately; keep in sync with the
  # version bench/tailwind_scan.sh was validated against.
  TAILWIND_VERSION: v4.3.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Fetch Tailwind standalone CLI
        run: |
          curl -fsSL -o tailwindcss \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x tailwindcss

      - name: Build site
        env:
          # build.sh finds ./tailwindcss on its own, but be explicit.
          TAILWIND_BIN: ./tailwindcss
        run: ./site/build.sh

      - name: Sanity-check output DOM
        # The page is fhtml's own dogfood; if its compiled DOM doesn't round-trip,
        # fail the deploy rather than publish something broken. Needs the converter.
        run: |
          cargo build --release --features convert --bin html2fhtml
          ./target/release/html2fhtml --check dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
