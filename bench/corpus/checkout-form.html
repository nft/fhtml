<form class="mx-auto max-w-2xl px-4 py-12 sm:px-6 lg:max-w-none lg:px-0">
  <section aria-labelledby="contact-heading">
    <h2 id="contact-heading" class="text-lg font-medium text-gray-900">Contact information</h2>
    <div class="mt-4">
      <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
      <input type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
    </div>
    <div class="mt-4">
      <label for="phone" class="block text-sm font-medium text-gray-700">Phone <span class="text-gray-400">(for delivery updates)</span></label>
      <input type="tel" id="phone" name="phone" autocomplete="tel" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
    </div>
  </section>
  <section aria-labelledby="shipping-heading" class="mt-10 border-t border-gray-200 pt-10">
    <h2 id="shipping-heading" class="text-lg font-medium text-gray-900">Shipping address</h2>
    <div class="mt-4 grid grid-cols-1 gap-y-4 sm:grid-cols-2 sm:gap-x-4">
      <div>
        <label for="first-name" class="block text-sm font-medium text-gray-700">First name</label>
        <input type="text" id="first-name" name="first-name" autocomplete="given-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>
      <div>
        <label for="last-name" class="block text-sm font-medium text-gray-700">Last name</label>
        <input type="text" id="last-name" name="last-name" autocomplete="family-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>
      <div class="sm:col-span-2">
        <label for="address" class="block text-sm font-medium text-gray-700">Street address</label>
        <input type="text" id="address" name="address" autocomplete="street-address" placeholder="1842 Larchmont Ave" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>
      <div class="sm:col-span-2">
        <label for="apartment" class="block text-sm font-medium text-gray-700">Apartment, suite, etc. <span class="text-gray-400">(optional)</span></label>
        <input type="text" id="apartment" name="apartment" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>
      <div>
        <label for="city" class="block text-sm font-medium text-gray-700">City</label>
        <input type="text" id="city" name="city" autocomplete="address-level2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>
      <div class="grid grid-cols-2 gap-x-4">
        <div>
          <label for="state" class="block text-sm font-medium text-gray-700">State</label>
          <select id="state" name="state" autocomplete="address-level1" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            <option>OR</option>
            <option>WA</option>
            <option>CA</option>
            <option>ID</option>
          </select>
        </div>
        <div>
          <label for="postal-code" class="block text-sm font-medium text-gray-700">ZIP</label>
          <input type="text" id="postal-code" name="postal-code" autocomplete="postal-code" inputmode="numeric" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
        </div>
      </div>
    </div>
    <div class="mt-4 flex items-center gap-x-2">
      <input type="checkbox" id="save-address" name="save-address" class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
      <label for="save-address" class="text-sm text-gray-600">Save this address for next time</label>
    </div>
  </section>
  <section aria-labelledby="payment-heading" class="mt-10 border-t border-gray-200 pt-10">
    <h2 id="payment-heading" class="text-lg font-medium text-gray-900">Payment details</h2>
    <div class="mt-4 grid grid-cols-1 gap-y-4 sm:grid-cols-4 sm:gap-x-4">
      <div class="sm:col-span-4">
        <label for="card-number" class="block text-sm font-medium text-gray-700">Card number</label>
        <div class="relative mt-1">
          <input type="text" id="card-number" name="card-number" autocomplete="cc-number" inputmode="numeric" placeholder="1234 1234 1234 1234" class="block w-full rounded-md border-gray-300 pr-10 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="pointer-events-none absolute right-3 top-1/2 h-5 w-5 -translate-y-1/2 text-gray-400">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z" />
          </svg>
        </div>
      </div>
      <div class="sm:col-span-2">
        <label for="name-on-card" class="block text-sm font-medium text-gray-700">Name on card</label>
        <input type="text" id="name-on-card" name="name-on-card" autocomplete="cc-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>
      <div>
        <label for="expiration" class="block text-sm font-medium text-gray-700">Expiry (MM/YY)</label>
        <input type="text" id="expiration" name="expiration" autocomplete="cc-exp" placeholder="08/29" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>
      <div>
        <label for="cvc" class="block text-sm font-medium text-gray-700">CVC</label>
        <input type="text" id="cvc" name="cvc" autocomplete="cc-csc" inputmode="numeric" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>
    </div>
  </section>
  <div class="mt-10 border-t border-gray-200 pt-6">
    <button type="submit" class="w-full rounded-md bg-indigo-600 px-4 py-3 text-base font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:w-auto sm:px-10">Pay $192.61</button>
    <p class="mt-3 flex items-center gap-x-1.5 text-sm text-gray-500">
      <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="h-4 w-4 text-gray-400">
        <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1Zm3 8V5.5a3 3 0 1 0-6 0V9h6Z" clip-rule="evenodd" />
      </svg>
      Payments are encrypted end to end.
    </p>
  </div>
</form>
